<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);

         const n = 12;
         const rInside = Math.sin(Math.PI / n) / (1 - Math.sin(Math.PI / n));
         const circInside = board.create('circle', [[0, 0], 1], jg.style.circleStyle);
         const circOutside = board.create('circle', [[0, 0], 1 + 2 * rInside], jg.style.circleStyle);
         const circInner = board.create('circle', [[0, 0], 1 + rInside], jg.style.pointStyleNoShow);
         const P = board.create('glider', [1 + rInside, 0, circInner], {name: 'P', ...jg.style.pointStyleDrag});

         const chainCirc = [];
         for (let i = 0; i < n; i++) {
            const newCenter = board.create('point', [() => jg.point.rotate([0, 0], i * 2 * Math.PI / n], jg.style.pointStyleNoShow);
            const newCircle = new Circle('circle', [newCenter, rInside], jg.style.circleStyle);
            chainCirc.push(newCircle);
         }
           
      </script>
   </body>
</html>
