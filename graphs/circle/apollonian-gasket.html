<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const disc = (a, b, c) => Math.sqrt(a * b + a * c + b * c);
         
         const curvaturefive = (a, b, c, d) => 2*(a + b + c) - d;
         
         
                 
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         // 2. Create the vertices
         const A = board.create('point', [-1.8, 3.1], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-3.3, -1.7], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [3.4, -2.6], {name: 'C', ...jg.style.pointStyleDrag});

         const rA = (jg.point.dist(A,B) + jg.point.dist(A,C) - jg.point.dist(B,C))/2;
         const rB = (jg.point.dist(A,B) - jg.point.dist(A,C) + jg.point.dist(B,C))/2;
         const rC = (-jg.point.dist(A,B) + jg.point.dist(A,C) + jg.point.dist(B,C))/2;
         
         const circA = board.create('circle', [A, rA], jg.style.circleStyle);
         const circB = board.create('circle', [B, rB], jg.style.circleStyle);
         const circC = board.create('circle', [C, rC], jg.style.circleStyle);
         const innerSoddyCircle = jg.triangle.innerSoddyCircle(board, A, B, C);
         const outerSoddyCircle = jg.triangle.outerSoddyCircle(board, A, B, C);
         
             
      </script>
   </body>
</html>
