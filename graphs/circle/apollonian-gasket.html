const disc = (a, b, c) => Math.sqrt(a * b + a * c + b * c);

const curvaturefive = (a, b, c, d) => 2*(a + b + c) - d;


        
        const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);

        // 2. Create the vertices
const A = board.create('point', [-1.8, 3.1], {name: 'A'});
const B = board.create('point', [-3.3, -1.7], {name: 'B'});
const C = board.create('point', [3.4, -2.6], {name: 'C'});

const circA = board.create('circle', [A, function() {return (A.Dist(B) - B.Dist(C) + C.Dist(A))/2;}], jg.style.circleStyle);
const circB = board.create('circle', [B, function() {return (A.Dist(B) + B.Dist(C) - C.Dist(A))/2;}], jg.style.circleStyle);
const circC = board.create('circle', [C, function() {return (-A.Dist(B) + B.Dist(C) + C.Dist(A))/2;}], jg.style.circleStyle);
const innerSoddyCircle = jg.triangle.innerSoddyCircle(board, A, B, C);
const outerSoddyCircle = jg.triangle.outerSoddyCircle(board, A, B, C);
