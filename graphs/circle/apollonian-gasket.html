<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const circArray = [];
         
         const disc = (a, b, c) => Math.sqrt(a * b + a * c + b * c);
         
         const curvaturefive = (a, b, c, d) => 2*(a + b + c) - d;
         
         const centerfive = (A, a, B, b, C, c, D, d) => {
            return [
               (2 * (a * A.X() + b * B.X() + c * C.X()) - d * D.X()) / curvaturefive(a, b, c, d),
               (2 * (a * A.Y() + b * B.Y() + c * C.Y()) - d * D.Y()) / curvaturefive(a, b, c, d)
            ];
         };

         const drawCircles = (n, A, a, B, b, C, c, D, d) => {
            let currentCirc;
            
            if (n >= 1) {
               const e = 2 * (a + b + c) - d;
               const Ex = (2 * (a * A.X() + b * B.X() + c * C.X()) - d * D.X()) / e;
               const Ey = (2 * (a * A.Y() + b * B.Y() + c * C.Y()) - d * D.Y()) / e;
               const E = board.create('point', [Ex, Ey], jg.style.pointNoShow);
               
               currentCirc = board.create("circle", [[Ex, Ey], 1/e], jg.style.circleStyle);

               circArray.push(currentCirc);

               drawCircles(n - 1, A, a, B, b, E, e, C, c);
               drawCircles(n - 1, A, a, C, c, E, e, B, b);
               drawCircles(n - 1, B, b, C, c, E, e, A, a);
            }
         }

         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         // 2. Create the vertices
         const A = board.create('point', [-1.0, 2.0], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-2.3, -1.1], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [1.2, -1.7], {name: 'C', ...jg.style.pointStyleDrag});
         const innerSoddyCenter = board.create('point', () => jg.triangle.innerSoddyCenter(A, B, C), jg.style.pointNoShow);
         const outerSoddyCenter = board.create('point', () => jg.triangle.outerSoddyCenter(A, B, C), jg.style.pointNoShow);

         const rA = () => (jg.point.dist(A,B) + jg.point.dist(A,C) - jg.point.dist(B,C))/2;
         const rB = () => (jg.point.dist(A,B) - jg.point.dist(A,C) + jg.point.dist(B,C))/2;
         const rC = () => (-jg.point.dist(A,B) + jg.point.dist(A,C) + jg.point.dist(B,C))/2;
         const innerSoddyRadius = jg.triangle.innerSoddyRadius(A, B, C);
         const outerSoddyRadius = jg.triangle.outerSoddyRadius(A, B, C);
         
         const circA = board.create('circle', [A, rA], jg.style.circleStyle);
         const circB = board.create('circle', [B, rB], jg.style.circleStyle);
         const circC = board.create('circle', [C, rC], jg.style.circleStyle);
         const innerSoddyCircle = jg.triangle.innerSoddyCircle(board, A, B, C);
         const outerSoddyCircle = jg.triangle.outerSoddyCircle(board, A, B, C);

         drawCircles(3, B, 1/rB(), C, 1/rC(), innerSoddyCenter, 1/innerSoddyRadius, A, 1/rA());
      </script>
   </body>
</html>
