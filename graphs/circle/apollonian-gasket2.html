<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const circArray = [];

         const drawCircles = (n, A, a, B, b, C, c, D, d) => {
            if (n >= 1) {
               // Helper: This treats 'v' as a function if it can be called, 
               // otherwise it treats it as a static value.
               const val = (v) => (typeof v === 'function' ? v() : v);

               // 1. Define curvature 'e' as a function
               const e = () => 2 * (val(a) + val(b) + val(c)) - val(d);

               // 2. Create point E with reactive coordinates
               const E = board.create('point', [
                  () => (2 * (val(a) * A.X() + val(b) * B.X() + val(c) * C.X()) - val(d) * D.X()) / e(),
                  () => (2 * (val(a) * A.Y() + val(b) * B.Y() + val(c) * C.Y()) - val(d) * D.Y()) / e()
               ], jg.style.pointStyleNoShow);

               // 3. Create the circle
               const currentCirc = board.create("circle", [E, () => 1 / e()], jg.style.circleStyle);
               circArray.push(currentCirc);

               // 4. Recurse (passing 'e' as the function for the next generation)
               drawCircles(n - 1, A, a, B, b, E, e, C, c);
               drawCircles(n - 1, A, a, C, c, E, e, B, b);
               drawCircles(n - 1, B, b, C, c, E, e, A, a);
            }
         }
         
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         // 2. Create the vertices
         const A = board.create('point', [-1.0, 2.0], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-2.3, -1.1], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [1.2, -1.7], {name: 'C', ...jg.style.pointStyleDrag});
         const innerSoddyCenter = board.create('point', [() => jg.triangle.triangleInnerSoddyCenter(A, B, C)], jg.style.pointStyleNoShow);
         const outerSoddyCenter = board.create('point', [() => jg.triangle.triangleOuterSoddyCenter(A, B, C)], jg.style.pointStyleNoShow);

         const rA = () => (jg.point.pointDist(A,B) + jg.point.pointDist(A,C) - jg.point.pointDist(B,C))/2;
         const rB = () => (jg.point.pointDist(A,B) - jg.point.pointDist(A,C) + jg.point.pointDist(B,C))/2;
         const rC = () => (-jg.point.pointDist(A,B) + jg.point.pointDist(A,C) + jg.point.pointDist(B,C))/2;
         const innerSoddyRadius = () => jg.triangle.triangleInnerSoddyRadius(A, B, C);
         const outerSoddyRadius = () => jg.triangle.triangleOuterSoddyRadius(A, B, C);
         
         const circA = board.create('circle', [A, rA], jg.style.circleStyle);
         const circB = board.create('circle', [B, rB], jg.style.circleStyle);
         const circC = board.create('circle', [C, rC], jg.style.circleStyle);
         const innerSoddyCircle = jg.triangle.triangleInnerSoddyCircle(board, A, B, C);
         const outerSoddyCircle = jg.triangle.triangleOuterSoddyCircle(board, A, B, C);

         const curvA = () => 1 / rA();
         const curvB = () => 1 / rB();
         const curvC = () => 1 / rC();
         const curvIn = () => 1 / innerSoddyRadius(A, B, C);

         const depth = 6;
         
         drawCircles(depth, B, curvB, C, curvC, innerSoddyCenter, curvIn, A, curvA);
         drawCircles(depth, A, curvA, C, curvC, innerSoddyCenter, curvIn, B, curvB);
         drawCircles(depth, A, curvA, B, curvB, innerSoddyCenter, curvIn, C, curvC);
         drawCircles(depth + 1, A, curvA, B, curvB, C, curvC, innerSoddyCenter, curvIn);
      </script>
   </body>
</html>
