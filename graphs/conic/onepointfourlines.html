<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script type="module" src="../../src/index.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script type="module">
      const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
      
const A = board.create('point', [-1.5, -1.1], {name: 'A'});
const P = board.create('point', [-2.5, 2.8], {name: 'P'});
const Q = board.create('point', [-2.9, -1.7], {name: 'Q'});
const R = board.create('point', [4.1, -3.5], {name: 'R'});
const S = board.create('point', [2.5, 3.1], {name: 'S'});

const linePQ = board.create('line', [P, Q], {...jg.style.lineStyle, strokeColor: 'lightgray'});
const lineQR = board.create('line', [Q, R], {...jg.style.lineStyle, strokeColor: 'lightgray'});
const lineRS = board.create('line', [R, S], {...jg.style.lineStyle, strokeColor: 'lightgray'});
const lineSP = board.create('line', [S, P], {...jg.style.lineStyle, strokeColor: 'lightgray'});
            
    </script>
</body>
</html>
