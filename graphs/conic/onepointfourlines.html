<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-1.5, -1.1], {name: 'A', ...jg.style.pointStyleDrag});
         const P = board.create('point', [-2.5, 2.8], {name: 'P', ...jg.style.pointStyleDrag});
         const Q = board.create('point', [-2.9, -1.7], {name: 'Q', ...jg.style.pointStyleDrag});
         const R = board.create('point', [4.1, -3.5], {name: 'R', ...jg.style.pointStyleDrag});
         const S = board.create('point', [2.5, 3.1], {name: 'S', ...jg.style.pointStyleDrag)};
         
         const X1 = board.create('point', [() => jg.point.intersection(A, Q, P, S)], jg.style.pointStyleNoShow);
         const X2 = board.create('point', [() => jg.point.intersection(A, R, P, S)], jg.style.pointStyleNoShow);
         const T1 = board.create('point', [() => jg.conic.fixedPoint(P, X2, S, X1, 0)], jg.style.pointStyleNoShow);
         const T2 = board.create('point', [() => jg.conic.fixedPoint(P, X2, S, X1, 1)], jg.style.pointStyleNoShow);
           
         const linePQ = board.create('line', [P, Q], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineQR = board.create('line', [Q, R], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineRS = board.create('line', [R, S], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineSP = board.create('line', [S, P], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         
         const I1 = board.create('point', [() => jg.point.intersection(A, T1, P, Q)], jg.style.pointStyleNoShow);
         const I2 = board.create('point', [() => jg.point.intersection(A, T2, P, Q)], jg.style.pointStyleNoShow);
         
         const conic1 = jg.conic.conicByLines(board, I1, Q, R, S, T1);
         const conic2 = jg.conic.conicByLines(board, I2, Q, R, S, T2);
               
      </script>
   </body>
</html>
