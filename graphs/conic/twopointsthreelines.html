<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-1.2, 1.5], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [0.5, -2.1], {name: 'B', ...jg.style.pointStyleDrag});
         const P = board.create('point', [-1.2, 3.4], {name: 'P', ...jg.style.pointStyleDrag});
         const Q = board.create('point', [-2.9, -1.4], {name: 'Q', ...jg.style.pointStyleDrag});
         const R = board.create('point', [3.4, -2.2], {name: 'R', ...jg.style.pointStyleDrag});
         
         const F = board.create('point', [() => jg.point.intersectionPoint(A, P, Q, R)], jg.style.pointStyleNoShow);
         const G = board.create('point', [() => jg.point.intersectionPoint(B, P, Q, R)], jg.style.pointStyleNoShow);
         const H = board.create('point', [() => jg.point.intersectionPoint(A, Q, P, R)], jg.style.pointStyleNoShow);
         const I = board.create('point', [() => jg.point.intersectionPoint(B, Q, P, R)], jg.style.pointStyleNoShow);
         
         const T1 = board.create('point', [() => jg.conic.fixedPoint(Q, R, F, G, 0)], jg.style.pointStyleNoShow);
         const T2 = board.create('point', [() => jg.conic.fixedPoint(Q, R, F, G, 1)], jg.style.pointStyleNoShow);
         const U1 = board.create('point', [() => jg.conic.fixedPoint(P, R, H, I, 0)], jg.style.pointStyleNoShow);
         const U2 = board.create('point', [() => jg.conic.fixedPoint(P, R, H, I, 1)], jg.style.pointStyleNoShow);
         
         const X11 = board.create('point', [() => jg.point.intersectionPoint(P, T1, Q, U1)], jg.style.pointStyleNoShow);
         const X12 = board.create('point', [() => jg.point.intersectionPoint(P, T1, Q, U2)], jg.style.pointStyleNoShow);
         const X21 = board.create('point', [() => jg.point.intersectionPoint(P, T2, Q, U1)], jg.style.pointStyleNoShow);
         const X22 = board.create('point', [() => jg.point.intersectionPoint(P, T2, Q, U2)], jg.style.pointStyleNoShow);
         
         const I1 = board.create('point', [() => jg.point.intersectionPoint(X11, A, R, P)], jg.style.pointStyleNoShow);
         const I2 = board.create('point', [() => jg.point.intersectionPoint(X11, B, R, Q)], jg.style.pointStyleNoShow);
         const I3 = board.create('point', [() => jg.point.intersectionPoint(X12, A, R, P)], jg.style.pointStyleNoShow);
         const I4 = board.create('point', [() => jg.point.intersectionPoint(X12, B, R, Q)], jg.style.pointStyleNoShow);
         const I5 = board.create('point', [() => jg.point.intersectionPoint(X21, A, R, P)], jg.style.pointStyleNoShow);
         const I6 = board.create('point', [() => jg.point.intersectionPoint(X21, B, R, Q)], jg.style.pointStyleNoShow);
         const I7 = board.create('point', [() => jg.point.intersectionPoint(X22, A, R, P)], jg.style.pointStyleNoShow);
         const I8 = board.create('point', [() => jg.point.intersectionPoint(X22, B, R, Q)], jg.style.pointStyleNoShow);
           
         const linePQ = board.create('line', [P, Q], jg.style.lineStyle);
         const linePR = board.create('line', [P, R], jg.style.lineStyle);
         const lineQR = board.create('line', [Q, R], jg.style.lineStyle);
         const conic1 = jg.conic.conicByLines(board, X11, I1, P, Q, I2);
         const conic2 = jg.conic.conicByLines(board, X12, I3, P, Q, I4);
         const conic3 = jg.conic.conicByLines(board, X21, I5, P, Q, I6);
         const conic4 = jg.conic.conicByLines(board, X22, I7, P, Q, I8);
              
      </script>
   </body>
</html>
