<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-2.0, 1.0], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-0.7, 0.8], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [-1.2, 1.8], {name: 'C', ...jg.style.pointStyleDrag});
         const P = board.create('point', [0.2, -0.3], {name: 'P', ...jg.style.pointStyleDrag});
         const Q = board.create('point', [-4.2, 0.8], {name: 'Q', ...jg.style.pointStyleDrag});
         const R = board.create('point', [-0.5, 3.7], {name: 'R', ...jg.style.pointStyleDrag});
         
         const F = board.create('point', [() => jg.point.intersectionPoint(A, C, P, Q)], jg.style.pointStyleNoShow);
         const G = board.create('point', [() => jg.point.intersectionPoint(A, C, P, R)], jg.style.pointStyleNoShow);
         const H = board.create('point', [() => jg.point.intersectionPoint(A, B, P, R)], jg.style.pointStyleNoShow);
         const I = board.create('point', [() => jg.point.intersectionPoint(A, B, P, Q)], jg.style.pointStyleNoShow);
         
         const X1 = board.create('point', [() => jg.conic.fixedPoint(A, B, H, I, 0)], jg.style.pointStyleNoShow);
         const X2 = board.create('point', [() => jg.conic.fixedPoint(A, B, H, I, 1)], jg.style.pointStyleNoShow);
         const Y1 = board.create('point', [() => jg.conic.fixedPoint(A, C, F, G, 0)], jg.style.pointStyleNoShow);
         const Y2 = board.create('point', [() => jg.conic.fixedPoint(A, C, F, G, 1)], jg.style.pointStyleNoShow);
         
         const I1 = board.create('point', [() => jg.point.intersectionPoint(P, Q, X1, Y1)], jg.style.pointStyleNoShow);
         const I2 = board.create('point', [() => jg.point.intersectionPoint(P, R, X1, Y1)], jg.style.pointStyleNoShow);
         const I3 = board.create('point', [() => jg.point.intersectionPoint(P, Q, X1, Y2)], jg.style.pointStyleNoShow);
         const I4 = board.create('point', [() => jg.point.intersectionPoint(P, R, X1, Y2)], jg.style.pointStyleNoShow);
         const I5 = board.create('point', [() => jg.point.intersectionPoint(P, Q, X2, Y1)], jg.style.pointStyleNoShow);
         const I6 = board.create('point', [() => jg.point.intersectionPoint(P, R, X2, Y1)], jg.style.pointStyleNoShow);
         const I7 = board.create('point', [() => jg.point.intersectionPoint(P, Q, X2, Y2)], jg.style.pointStyleNoShow);
         const I8 = board.create('point', [() => jg.point.intersectionPoint(P, R, X2, Y2)], jg.style.pointStyleNoShow);
         
         const linePQ = board.create('line', [P, Q], jg.style.lineStyle);
         const linePR = board.create('line', [P, R], jg.style.lineStyle);
         
         const conic1 = board.create('conic', [A, B, C, I1, I2], {...jg.style.circleStyle, strokeColor : "orange"});
         const conic2 = board.create('conic', [A, B, C, I3, I4], {...jg.style.circleStyle, strokeColor : "purple"});
         const conic3 = board.create('conic', [A, B, C, I5, I6], {...jg.style.circleStyle, strokeColor : "yellow"});
         const conic4 = board.create('conic', [A, B, C, I7, I8], {...jg.style.circleStyle, strokeColor : "green"});
      
      </script>
   </body>
</html>
