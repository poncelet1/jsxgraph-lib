<!DOCTYPE html>
<html>
<head>
    <title>JSXGraph + Asy Library Test</title>
    <script type="text/javascript" charset="UTF-8"
     src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />

    <style>
        /* This forces the border to show up on your custom IDs */
        .jxgbox { 
            border: 1px solid #ccc; 
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .graph-container {
    width: 500px; 
    height: 500px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
    </style>
</head>
<body>
    <h1>Conic Graphs</h1>

    <h3>Conic from five points</h3>
    <div class="graph-container">
        <iframe src="fivepoints.html"></iframe>
    </div>

    <h3>Conic from five lines</h3>
    <div class="graph-container">
        <iframe src="fivelines.html"></iframe>
    </div>

    <h3>Desargues Involution Theorem</h3>
    <div class="graph-container">
        <iframe src="desarguesinvolution.html"></iframe>
    </div>

    <h3>Conic from four points and one line</h3>
    <div class="graph-container">
        <iframe src="fourpointsoneline.html"></iframe>
    </div>

    <h3>Conic from one point and four lines</h3>
    <div class="graph-container">
        <iframe src="onepointfourlines.html"></iframe>
    </div>

    <h3>Conic from three points and two lines</h3>
    <div class="graph-container">
        <iframe src="threepointstwolines.html"></iframe>
    </div>

    <h3>Conic from two points and three lines</h3>
    <div class="graph-container">
        <iframe src="twopointsthreelines.html"></iframe>
    </div>

    <h3>Test</h3>
    <div class="graph-container">
        <iframe src="test.html"></iframe>
    </div>
</body>
</html>
