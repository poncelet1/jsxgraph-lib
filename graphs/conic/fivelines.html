<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-1.8, 3.1], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-3.3, -1.7], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [-1.2, -2.6], {name: 'C', ...jg.style.pointStyleDrag});
         const D = board.create('point', [3.5, -0.4], {name: 'D', ...jg.style.pointStyleDrag});
         const E = board.create('point', [1.1, 2.9], {name: 'E', ...jg.style.pointStyleDrag});
         
         const lineAB = board.create('line', [A, B], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineBC = board.create('line', [B, C], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineCD = board.create('line', [C, D], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineDE = board.create('line', [D, E], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         const lineEA = board.create('line', [E, A], {...jg.style.lineStyle, strokeColor: 'lightgray'});
         
         const conicABCDE = jg.conic.conicByLines(board, A, B, C, D, E);
                  
      </script>
   </body>
</html>
