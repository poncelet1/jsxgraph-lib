<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script type="module" src="../../src/index.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script type="module">
      const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
      
const A = board.create('point', [-0.3, 2.5], {name: 'A'});
const B = board.create('point', [-2.1, 2.1], {name: 'B'});
const C = board.create('point', [0.7, 0.3], {name: 'C'});
const D = board.create('point', [1.1, 2.0], {name: 'D'});
const P = board.create('point', [-1.2, -0.4], {name: 'P'});
const Q = board.create('point', [1.5, -1], {name: 'Q'});

const X1 = board.create('point', [() => jg.point.intersection(A, B, P, Q)], { visible: false, withLabel: false });
const X2 = board.create('point', [() => jg.point.intersection(C, D, P, Q)], { visible: false, withLabel: false });
const Y1 = board.create('point', [() => jg.point.intersection(A, D, P, Q)], { visible: false, withLabel: false });
const Y2 = board.create('point', [() => jg.point.intersection(B, C, P, Q)], { visible: false, withLabel: false });

const E1 = board.create('point', [() => jg.conic.fixedPoint(X1, X2, Y1, Y2, 0)], {...jg.style.pointStyle, withLabel: false});
const E2 = board.create('point', [() => jg.conic.fixedPoint(X1, X2, Y1, Y2, 1)], {...jg.style.pointStyle, withLabel: false});

const linePQ = board.create('line', [P, Q], jg.style.lineStyle);
const conic1 = board.create('conic', [A, B, C, D, E1], jg.style.circleStyle);
const conic2 = board.create('conic', [A, B, C, D, E2], jg.style.circleStyle);
            
    </script>
</body>
</html>
