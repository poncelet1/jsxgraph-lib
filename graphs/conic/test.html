<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-1.8, 3.1], {name: 'A'});
         const B = board.create('point', [-3.3, -1.7], {name: 'B'});
         const C = board.create('point', [3.4, -2.6], {name: 'C'});
         const D = board.create('point', [1.2, 1.5], {name: 'D'});
         const E = board.create('point', [-0.5, -2.2], {name: 'E'});
         //const conicABCDEcenter = board.create('point', [() => jg.conic.conicCenterByPoints(A, B, C, D, E)], {name: 'O', ...jg.style.pointStyle});
         const L = board.create('point', [0.1, 0.2], {name: 'P'});
         const X = board.create('point', [() => jg.point.intersectionPoint(A, B, D, E)], {name: 'X', ...jg.style.pointStyle});
         const Y = board.create('point', [() => jg.point.intersectionPoint(B, C, E, L)], {name: 'Y', ...jg.style.pointStyle});
         const Z = board.create('point', [() => jg.point.intersectionPoint(C, D, X, Y)], {name: 'Z', ...jg.style.pointStyle});
         const F = board.create('point', [() => jg.point.intersectionPoint(A, Z, E, L)], {name: 'F', ...jg.style.pointStyle}); 
         
         const lineL = board.create('line', [E, L], jg.style.lineStyle);
         const lineAB = board.create('line', [A, B], jg.style.lineStyle);
         const lineDE = board.create('line', [D, E], jg.style.lineStyle);
         const lineBC = board.create('line', [B, C], jg.style.lineStyle);
         const lineCD = board.create('line', [C, D], jg.style.lineStyle);
         const lineXY = board.create('line', [X, Y], jg.style.lineStyle);
         const lineAZ = board.create('line', [A, Z], jg.style.lineStyle);
         const conicABCDE = board.create('conic', [A, B, C, D, E], jg.style.circleStyle);
         
         board.create('text', [4, 4, () => `${jg.conic.conicxx(A, B, C, D, E).toFixed(4)}`]);
         board.create('text', [4, 3.5, () => `${jg.conic.conicxy(A, B, C, D, E).toFixed(4)}`]);
         board.create('text', [4, 3, () => `${jg.conic.conicyy(A, B, C, D, E).toFixed(4)}`]);
         board.create('text', [4, 2.5, () => `${jg.conic.conicx(A, B, C, D, E).toFixed(4)}`]);
         board.create('text', [4, 2, () => `${jg.conic.conicy(A, B, C, D, E).toFixed(4)}`]);
         board.create('text', [4, 1.5, () => `${jg.conic.conic1(A, B, C, D, E).toFixed(4)}`]);
                  
      </script>
   </body>
</html>
