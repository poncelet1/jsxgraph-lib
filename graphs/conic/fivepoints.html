<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);
         
         const A = board.create('point', [-1.8, 3.1], {name: 'A', ...jg.style.pointStyleDrag}});
         const B = board.create('point', [-3.3, -1.7], {name: 'B', ...jg.style.pointStyleDrag}});
         const C = board.create('point', [3.4, -2.6], {name: 'C', ...jg.style.pointStyleDrag}});
         const D = board.create('point', [1.2, 1.5], {name: 'D', ...jg.style.pointStyleDrag}});
         const E = board.create('point', [-0.5, -2.2], {name: 'E', ...jg.style.pointStyleDrag}});
         
         const conicABCDE = board.create('conic', [A, B, C, D, E], jg.style.circleStyle);
                  
      </script>
   </body>
</html>
