<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyleHyperbolic);
         
         const A = board.create('point', [-0.2, 0.5], {name: 'A', ...jg.style.pointStyleDrag});
         const P = board.create('point', [0.2, -0.5], {name: 'P', ...jg.style.pointStyleDrag});
         const hypercircA = jg.hyperbolic.hyperCircle(board, A, 1);
           
         const Ap = board.create('point', [() => jg.hyperbolic.movePointToOrigin(A, P)], jg.style.pointStyleNoShow);
         const hypercircAp = jg.hyperbolic.hyperCircle(board, Ap, 1, jg.style.pointStyleNoShow);
         const Op = board.create('point', [() => jg.hyperbolic.hyperCircleCenter(Ap, 1)], jg.style.pointStyleNoShow);
         
         const diamCirc = board.create('circle', [
           () => jg.point.pointScale(Op, 1/2), 
           () => jg.point.dist(Op)/2
           ], { visible: false, withLabel: false }
         );
         
         const Tp1 = board.create('intersection', [hypercircAp, diamCirc, 0], jg.style.pointStyleNoShow);
         const Tp2 = board.create('intersection', [hypercircAp, diamCirc, 1], jg.style.pointStyleNoShow);
         const T1 = board.create('point', [() => jg.hyperbolic.movePointFromOrigin(Tp1, P)], {...jg.style.pointStyleNoDrag, withLabel : false});
         const T2 = board.create('point', [() => jg.hyperbolic.movePointFromOrigin(Tp2, P)], {...jg.style.pointStyleNoDrag, withLabel : false});
         
         const tangent1 = jg.hyperbolic.hyperline(board, P, T1);
         const tangent2 = jg.hyperbolic.hyperline(board, P, T2);
           
         const unitCircle = board.create('circle', [[0, 0], 1], jg.style.circleStyle);
         
      </script>
   </body>
</html>
