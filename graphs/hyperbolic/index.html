<!DOCTYPE html>
<html>
<head>
    <title>JSXGraph + Asy Library Test</title>
    <script type="text/javascript" charset="UTF-8"
     src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />

    <style>
        /* This forces the border to show up on your custom IDs */
        .jxgbox { 
            border: 1px solid #ccc; 
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .graph-container {
    width: 500px; 
    height: 500px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
    </style>
</head>
<body>
    <h1>Hyperbolic Graphs</h1>

    <h3>Move Point to Origin</h3>
    <div class="graph-container">
        <iframe src="movepointtoorigin.html"></iframe>
    </div>

    <h3>Hyperbolic circle</h3>
    <div class="graph-container">
        <iframe src="hypercircle.html"></iframe>
    </div>

    <h3>Hyperbolic line and line segment</h3>
    <div class="graph-container">
        <iframe src="hyperline.html"></iframe>
    </div>

    <h3>Hyperbolic reflection and projection</h3>
    <div class="graph-container">
        <iframe src="hyperreflect.html"></iframe>
    </div>

    <h3>Hyperbolic centroid</h3>
    <div class="graph-container">
        <iframe src="hypercentroid.html"></iframe>
    </div>

    <h3>Hyperbolic incircle and excircles</h3>
    <div class="graph-container">
        <iframe src="hyperincircle.html"></iframe>
    </div>

    <h3>Hyperbolic orthocenter</h3>
    <div class="graph-container">
        <iframe src="hyperorthocenter.html"></iframe>
    </div>

    <h3>Hyperbolic circumcircle</h3>
    <div class="graph-container">
        <iframe src="hypercircumcircle.html"></iframe>
    </div>

    <h3>test</h3>
    <div class="graph-container">
        <iframe src="test.html"></iframe>
    </div>
</body>
</html>
