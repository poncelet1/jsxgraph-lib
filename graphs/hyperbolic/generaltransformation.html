<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyleHyperbolic);
         
         const A = board.create('point', [-0.3, 0.7], {name: 'A', ...jg.style.pointStyleDrag});
         const unitCircle = board.create('circle', [[0, 0], 1], jg.style.circleStyle);
         const B = board.create('glider', [1, 0, unitCircle], {name: 'B', ...jg.style.pointStyleDrag});
         
         const circlesA = [];
           
         for (let i = 1; i <= 15; i++) {
            const r = Math.log((1 + i / 16) / (1 - i / 16));
         let currentCirc;
         
         if (i % 4 == 0) {
            currentCirc = jg.hyperbolic.hyperCircle(board, A, r);
         } else {
            currentCirc = jg.hyperbolic.hyperCircle(board, A, r, {...jg.style.circleStyle, strokeColor: 'lightgray'});
         }
         
            circlesA.push(currentCirc);
         }
         
         const linesB = [];
           
         for (let i = 0; i <= 5; i++) {
            const startPoint = board.create('point', [() => jg.hyperbolic.hyperRot(A, i * Math.PI / 6, B)], {visible: false});
            const endPoint = board.create('point', [() => jg.hyperbolic.hyperRot(A, (i + 6) * Math.PI / 6, B)], {visible: false});
            linesB.push(jg.hyperbolic.hyperline(board, startPoint, endPoint));
         }
           
      </script>
   </body>
</html>
