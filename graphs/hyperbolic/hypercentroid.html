<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyleHyperbolic);
         
         const A = board.create('point', [-0.3, 0.7], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [-0.6, -0.1], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [0.5, -0.3], {name: 'C', ...jg.style.pointStyleDrag});
         const D = board.create('point', [() => jg.hyperbolic.hyperMidpoint(B, C)], {name: 'D', ...jg.style.pointStyleNoDrag});
         const E = board.create('point', [() => jg.hyperbolic.hyperMidpoint(C, A)], {name: 'E', ...jg.style.pointStyleNoDrag});
         const F = board.create('point', [() => jg.hyperbolic.hyperMidpoint(A, B)], {name: 'F', ...jg.style.pointStyleNoDrag});
         const G = board.create('point', [() => jg.hyperbolic.hyperCentroid(A, B, C)], {name: 'G', ...jg.style.pointStyleNoDrag});
         
         const linesegAB = jg.hyperbolic.hyperlineSegment(board, A, B);
         const linesegAC = jg.hyperbolic.hyperlineSegment(board, A, C);
         const linesegBC = jg.hyperbolic.hyperlineSegment(board, B, C);
         const linesegAD = jg.hyperbolic.hyperlineSegment(board, A, D);
         const linesegBE = jg.hyperbolic.hyperlineSegment(board, B, E);
         const linesegCF = jg.hyperbolic.hyperlineSegment(board, C, F);
           
         const unitCircle = board.create('circle', [[0, 0], 1], jg.style.circleStyle);
         
      </script>
   </body>
</html>
