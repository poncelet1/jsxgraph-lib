<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script type="module" src="../../src/index.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script type="module">
      const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyleHyperbolic);
      
const A = board.create('point', [-0.2, 0.5], {name: 'A'});
const B = board.create('point', [0.3, 0.1], {name: 'B'});
const C = board.create('point', [-0.4, -0.1], {name: 'C'});
const D = board.create('point', [() => jg.hyperbolic.hyperIntouchPoint(A, B, C)], {name: 'D', ...jg.style.pointStyle});
const E = board.create('point', [() => jg.hyperbolic.hyperIntouchPoint(B, C, A)], {name: 'E', ...jg.style.pointStyle});
const F = board.create('point', [() => jg.hyperbolic.hyperIntouchPoint(C, A, B)], {name: 'F', ...jg.style.pointStyle});

const lineSegAB = jg.hyperbolic.hyperlineSegment(board, A, B);
const lineSegAC = jg.hyperbolic.hyperlineSegment(board, A, C);
const lineSEgBC = jg.hyperbolic.hyperlineSegment(board, B, C);

const incircABC = jg.triangle.circumcircle(board, D, E, F);
const unitcircle = board.create('circle', [[0, 0], 1], jg.style.circleStyle);

    </script>
</body>
</html>
