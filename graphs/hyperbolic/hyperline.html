<!DOCTYPE html>
<html>
   <head>
      <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
      <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
      <script type="module" src="../../src/index.js"></script>
      <style>
         body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
         .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
      </style>
   </head>
   <body>
      <div id="jxgbox" class="jxgbox"></div>
      <script type="module">
         const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyleHyperbolic);
         
         const A = board.create('point', [-0.2, 0.5], {name: 'A', ...jg.style.pointStyleDrag});
         const B = board.create('point', [0.3, 0.1], {name: 'B', ...jg.style.pointStyleDrag});
         const C = board.create('point', [-0.4, -0.1], {name: 'C', ...jg.style.pointStyleDrag});
         const D = board.create('point', [0.2, 0.4], {name: 'D', ...jg.style.pointStyleDrag});
         const M = board.create('point', [() => jg.hyperbolic.hyperMidpoint(A, B)], {name: 'M', ...jg.style.pointStyleNoDrag});
         //const P = board.create('point', [() => jg.hyperbolic.hyperlineEndPoint(A, B)], {name: 'P', ...jg.style.pointStyle});
         //const Q = board.create('point', [() => jg.hyperbolic.hyperlineEndPoint(B, A)], {name: 'Q', ...jg.style.pointStyle});
         const X = board.create('point', [() => jg.hyperbolic.clineCenter(C, D)], {name: 'X', ...jg.style.pointStyleNoDrag});
         board.create('text', [-1, -1, () => `${jg.triangle.signedArea(X, C, D).toFixed(4)}`]);
         
         const lineAB = jg.hyperbolic.hyperline(board, A, B);
         const lineCD = jg.hyperbolic.hyperlineSegment(board, C, D);
         const unitCircle = board.create('circle', [[0, 0], 1], jg.style.circleStyle);
         
      </script>
   </body>
</html>
