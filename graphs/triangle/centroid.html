
<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script type="module" src="../../src/index.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script type="module">
        const board = JXG.JSXGraph.initBoard('jxgbox', jg.style.boardStyle);

        // 2. Create the vertices
const A = board.create('point', [-1.8, 3.1], {name: 'A'});
const B = board.create('point', [-3.3, -1.7], {name: 'B'});
const C = board.create('point', [3.4, -2.6], {name: 'C'});
const MA = board.create('midpoint', [B, C], jg.style.pointStyleNoLabel);
const MB = board.create('midpoint', [A, C], jg.style.pointStyleNoLabel);
const MC = board.create('midpoint', [A, B], jg.style.pointStyleNoLabel);
const G = board.create('point', [() => jg.triangle.centroid(A, B, C)], {name: 'G', ...jg.style.pointStyle});

const medA = board.create('segment', [A, MA], jg.style.lineStyle);
const medB = board.create('segment', [B, MB], jg.style.lineStyle);
const medC = board.create('segment', [C, MC], jg.style.lineStyle);
        
const triABC = board.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    ...jg.style.triangleStyle
});
    </script>
</body>
</html>
