<!DOCTYPE html>
<html>
<head>
    <title>JSXGraph + Asy Library Test</title>
    <script type="text/javascript" charset="UTF-8"
     src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    
    <script src="../functions.js"></script>

    <style>
        /* This forces the border to show up on your custom IDs */
        .jxgbox { 
            border: 1px solid #ccc; 
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .graph-container {
    width: 500px; 
    height: 500px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
    </style>
</head>
<body>
    <h1>Triangle Graphs</h1>

    <h3>Interp Function</h3>
    <p>Drag the vertices to see how the medians always intersect at point G.</p>
    <div class="graph-container">
        <iframe src="interp.html"></iframe>
    </div>

    <h3>Centroid of a Triangle</h3>
    <div id="jxg-centroid" class="jxgbox" style="width:500px; height:500px;"></div>

    <script>
        var boardcentroid = JXG.JSXGraph.initBoard('jxg-centroid', {boundingbox: [-5, 5, 5, -5], axis: true, zoom: {wheel: true, needShift: false}, pan: {enabled: true, needShift: false, needCtrl: false}});

        // 2. Create the vertices
var A = boardcentroid.create('point', [-3, -2], {name: 'A'});
var B = boardcentroid.create('point', [3, -2], {name: 'B'});
var C = boardcentroid.create('point', [0, 4], {name: 'C'});

// 3. Create the triangle (Polygon)
var tri = boardcentroid.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    borders: {
        fixed: true,
        isDraggable: false,
        highlight: false // Prevents the edges from turning dark when hovered
    },
    fixed: true,
    isDraggable: false,
    highlight: false
});

// Wrap the arrow function in [ ]
var Ma = boardcentroid.create('midpoint', [B, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
var Mb = boardcentroid.create('midpoint', [A, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
var Mc = boardcentroid.create('midpoint', [A, B], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
        

// 5. Draw the Medians
var medA = boardcentroid.create('segment', [A, Ma], {dash: 2, strokeColor: 'gray', highlight: false});
var medB = boardcentroid.create('segment', [B, Mb], {dash: 2, strokeColor: 'gray', highlight: false});
var medC = boardcentroid.create('segment', [C, Mc], {dash: 2, strokeColor: 'gray', highlight: false});

// Centroid Point
        var G = boardcentroid.create('point', [() => jg.centroid(A, B, C)], {
            name: 'G', 
            color: 'red'
        });

// 7. Add a title inside the board
boardcentroid.create('text', [-4.5, 4.5], "Triangle Centroid & Medians", {
    fontSize: 16, 
    fontWeight: 'bold',
    fixed: true
});
    </script>

    <h3>Circumcircle of a Triangle</h3>
    <div id="jxg-circumcircle" class="jxgbox" style="width:500px; height:500px;"></div>

    <script>
        var boardcircumcircle = JXG.JSXGraph.initBoard('jxg-circumcircle', {boundingbox: [-5, 5, 5, -5], axis: true, zoom: {wheel: true, needShift: false}, pan: {enabled: true, needShift: false, needCtrl: false}});

        // 2. Create the vertices
var A = boardcircumcircle.create('point', [-3, -2], {name: 'A'});
var B = boardcircumcircle.create('point', [3, -2], {name: 'B'});
var C = boardcircumcircle.create('point', [0, 4], {name: 'C'});

// 3. Create the triangle (Polygon)
var tri = boardcircumcircle.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    borders: {
        fixed: true,
        isDraggable: false,
        highlight: false // Prevents the edges from turning dark when hovered
    },
    fixed: true,
    isDraggable: false,
    highlight: false
});


// Centroid Point
    var O = boardcircumcircle.create('circumcenter', [A, B, C]);
    var circABC = boardcircumcircle.create('circumcircle', [A, B, C]);

// 7. Add a title inside the board
boardcircumcircle.create('text', [-4.5, 4.5], "Triangle circumcircle", {
    fontSize: 16, 
    fontWeight: 'bold',
    fixed: true
});
    </script>
</body>
</html>
