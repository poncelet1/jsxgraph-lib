<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script src="../functions.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script>
        const board = JXG.JSXGraph.initBoard('jxgbox', ...jg.boardStyle);

        // 2. Create the vertices
const A = board.create('point', [-1.8, 3.1], {name: 'A'});
const B = board.create('point', [-3.3, -1.7], {name: 'B'});
const C = board.create('point', [3.4, -2.6], {name: 'C'});

// 3. Create the triangle (Polygon)
const tri = board.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    ...jg.triangleStyle
});

// Wrap the arrow function in [ ]
const Ma = board.create('midpoint', [B, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
const Mb = board.create('midpoint', [A, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
const Mc = board.create('midpoint', [A, B], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
        

// 5. Draw the Medians
const medA = board.create('segment', [A, Ma], {dash: 2, strokeColor: 'gray', highlight: false});
const medB = board.create('segment', [B, Mb], {dash: 2, strokeColor: 'gray', highlight: false});
const medC = board.create('segment', [C, Mc], {dash: 2, strokeColor: 'gray', highlight: false});

// Centroid Point
        var G = board.create('point', [() => jg.centroid(A, B, C)], {
            name: 'G', 
            color: 'red'
        });

    </script>
</body>
</html>
