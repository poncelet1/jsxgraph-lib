<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script src="../functions.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('jxgbox', {boundingbox: [-5, 5, 5, -5], axis: true, zoom: {wheel: true, needShift: false}, pan: {enabled: true, needShift: false, needCtrl: false}});

        // 2. Create the vertices
var A = board.create('point', [-3, -2], {name: 'A'});
var B = board.create('point', [3, -2], {name: 'B'});
var C = board.create('point', [0, 4], {name: 'C'});

// 3. Create the triangle (Polygon)
var tri = board.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    borders: {
        fixed: true,
        isDraggable: false,
        highlight: false // Prevents the edges from turning dark when hovered
    },
    fixed: true,
    isDraggable: false,
    highlight: false
});


// Centroid Point
    var O = board.create('circumcenter', [A, B, C]);
    var circABC = board.create('circumcircle', [A, B, C]);

// 7. Add a title inside the board
board.create('text', [-4.5, 4.5], "Triangle circumcircle", {
    fontSize: 16, 
    fontWeight: 'bold',
    fixed: true
});
    </script>
</body>
</html>
