<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css" />
    <script src="../functions.js"></script>
    <style>
        body { margin: 0; overflow: hidden; } /* Removes scrollbars inside the frame */
        .jxgbox { width: 100vw; height: 100vh; border: none; } /* Fills the frame */
    </style>
</head>
<body>
    <div id="jxgbox" class="jxgbox"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('jxgbox', {boundingbox: [-5, 5, 5, -5], axis: true, zoom: {wheel: true, needShift: false}, pan: {enabled: true, needShift: false, needCtrl: false}});

        // 2. Create the vertices
var A = board.create('point', [-3, -2], {name: 'A'});
var B = board.create('point', [3, -2], {name: 'B'});
var C = board.create('point', [0, 4], {name: 'C'});

// 3. Create the triangle (Polygon)
var tri = board.create('polygon', [A, B, C], {
    fillColor: '#ffff00', 
    fillOpacity: 0.2,
    borders: {
        fixed: true,
        isDraggable: false,
        highlight: false // Prevents the edges from turning dark when hovered
    },
    fixed: true,
    isDraggable: false,
    highlight: false
});

// Wrap the arrow function in [ ]
var Ma = board.create('midpoint', [B, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
var Mb = board.create('midpoint', [A, C], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
var Mc = board.create('midpoint', [A, B], {
    size: 2,             // Default is usually 3 or 4; 2 is nice and small
    strokeColor: 'black', // The outline of the point
    fillColor: 'black',   // The inside of the point
    name: ''             // Optional: removes the label if you don't want 'Ma' showing
});
        

// 5. Draw the Medians
var medA = board.create('segment', [A, Ma], {dash: 2, strokeColor: 'gray', highlight: false});
var medB = board.create('segment', [B, Mb], {dash: 2, strokeColor: 'gray', highlight: false});
var medC = board.create('segment', [C, Mc], {dash: 2, strokeColor: 'gray', highlight: false});

var G1 = board.create('point', [() => jg.centroid(A, Mb, Mc)], {name: 'G1', color: 'red'});
var G2 = board.create('point', [() => jg.centroid(Ma, B, Mc)], {name: 'G2', color: 'red'});
var G3 = board.create('point', [() => jg.centroid(Ma, Mb, C)], {name: 'G3', color: 'red'});
        

// Centroid Point
        var G = board.create('point', [() => jg.centroid(G1, G2, G3)], {
            name: 'G', 
            color: 'red'
        });

var P = board.create('point', [-1, 1], {name: 'P'});
var circP = board.crate('circle', [P,1]);
        
// 7. Add a title inside the board
board.create('text', [-4.5, 4.5], "Triangle Centroid & Medians", {
    fontSize: 16, 
    fontWeight: 'bold',
    fixed: true
});
    </script>
</body>
</html>
